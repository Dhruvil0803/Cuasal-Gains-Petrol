acters\\nWITH apoc.text.split(specStr, \\\"\\\") AS chars\\n\\n// Step 3: Tag each character with its position (1\u2013200)\\nWITH [i IN range(0,199) | {position: i + 1, char: chars[i]}] AS posList\\nUNWIND posList AS pc\\nWITH pc\\nWHERE pc.char \u003c\u003e \\\" \\\"  // Ignore blanks\\n\\n// Step 4: Build specKey like 009J, 010C, 124B\\nWITH CASE\\n  WHEN pc.position \u003c 10 THEN \u002700\u0027 + toString(pc.position)\\n  WHEN pc.position \u003c 100 THEN \u00270\u0027 + toString(pc.position)\\n  ELSE toString(pc.position)\\nEND + pc.char AS specKey\\n\\n// Step 5: Match SPEC \u2192 GUIDE only\\nMATCH (spec:SPEC {Spec: specKey})\\nMATCH (guide:GUIDE)-[:ASSOCIATED_SPEC]-\u003e(spec)\\n\\n// Step 6: Optionally match demand from HAVING_SERIES\\nOPTIONAL MATCH (guide)-[hs:HAVING_SERIES]-\u003e(:SERIES)\\n\\n// Step 7: Compute values and simplified status\\nWITH \\n  spec.Spec AS Spec,\\n  guide.GH_ID AS GH_ID,\\n  guide.Guide_Description AS Guide_Description,\\n  guide.PPR1_Guide_Limit AS Guide_Limit,\\n  coalesce(hs.Quantity, 0) AS Demand,\\n  guide.PPR1_Guide_Limit - coalesce(hs.Quantity, 0) AS Remaining_Capacity\\nWHERE Demand \u003e Guide_Limit\\n\\n// Step 8: Final table output (with filtered status)\\nWITH \\n  Spec,\\n  GH_ID,\\n  Guide_Description,\\n  Guide_Limit,\\n  Demand,\\n  Remaining_Capacity,\\n  \u0027\u26a0\ufe0f Demand exceeds Guide Limit\u0027 AS Status\\n\\nRETURN\\n  Spec,\\n  GH_ID,\\n  Guide_Description,\\n  Guide_Limit,\\n  Demand,\\n  Remaining_Capacity,\\n  Status\\nORDER BY Remaining_Capacity ASC  // Most negative first = most over-utilized\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": false,\n          \"width\": 22,\n          \"height\": 4,\n          \"x\": 0,\n          \"y\": 22,\n          \"type\": \"table\",\n          \"fields\": [\n            \"Spec\",\n            \"GH_ID\",\n            \"Guide_Description\",\n            \"Guide_Limit\",\n            \"Demand\",\n            \"Remaining_Capacity\",\n            \"Status\"\n          ],\n          \"selection\": {},\n          \"settings\": {},\n          \"collapseTimeout\": 0\n        },\n        {\n          \"id\": \"b6e7faea-5b7e-428b-82b2-24f69625139e\",\n          \"title\": \"Guide-Constrained Specs for Selected SPEC_200\",\n          \"query\": \"// Step 1: Accept one SPEC_200 string input\\nWITH $neodash_spec_200_spec_200 AS specStr\\n\\n// Step 2: Split into 200 characters\\nWITH apoc.text.split(specStr, \\\"\\\") AS chars\\n\\n// Step 3: Tag each character with its position (1\u2013200)\\nWITH [i IN range(0,199) | {position: i + 1, char: chars[i]}] AS posList\\nUNWIND posList AS pc\\nWITH pc\\nWHERE pc.char \u003c\u003e \\\" \\\"  // Ignore blank characters\\n\\n// Step 4: Build specKey like 009J, 010C, 124B\\nWITH CASE\\n  WHEN pc.position \u003c 10 THEN \u002700\u0027 + toString(pc.position)\\n  WHEN pc.position \u003c 100 THEN \u00270\u0027 + toString(pc.position)\\n  ELSE toString(pc.position)\\nEND + pc.char AS specKey\\n\\n// Step 5: Match SPEC \u2192 GUIDE only (no SPEC_200 join)\\nMATCH (spec:SPEC {Spec: specKey})\\nMATCH (guide:GUIDE)-[:ASSOCIATED_SPEC]-\u003e(spec)\\n\\n// Step 6: Optionally get demand from HAVING_SERIES\\nOPTIONAL MATCH (guide)-[hs:HAVING_SERIES]-\u003e(:SERIES)\\n\\n// Step 7: Only include over-limit specs\\nWITH \\n  spec.Spec AS specKey,\\n  guide.GH_ID AS ghId,\\n  guide.PPR1_Guide_Limit AS Guide_Limit,\\n  coalesce(hs.Quantity, 0) AS Demand\\nWHERE Guide_Limit IS NOT NULL AND Demand \u003e Guide_Limit\\n\\n// Step 8: Build display label with \u26a0\ufe0f\\nWITH specKey, ghId, Guide_Limit, Demand,\\n     specKey + \u0027 (\u0027 + ghId + \u0027) \u26a0\ufe0f\u0027 AS displayLabel\\n\\n// Step 9: Format for grouped bar chart\\nWITH [\\n  {spec: displayLabel, series: \u0027Guide Limit\u0027, value: Guide_Limit},\\n  {spec: displayLabel, series: \u0027Demand\u0027, value: Demand}\\n] AS barRows\\nUNWIND barRows AS row\\n\\n// Step 10: Return to NeoDash\\nRETURN row.spec AS spec, row.series AS series, row.value AS value\\nORDER BY spec\\n\\n\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": true,\n          \"width\": 22,\n          \"height\": 6,\n          \"x\": 0,\n          \"y\": 26,\n          \"type\": \"bar\",\n          \"fields\": [\n            \"spec\",\n            \"series\",\n            \"value\"\n          ],\n          \"selection\": {\n            \"index\": \"spec\",\n            \"value\": \"value\",\n            \"key\": \"series\"\n          },\n          \"settings\": {\n            \"fullscreenEnabled\": true,\n            \"legend\": false,\n            \"showOptionalSelections\": true,\n            \"groupMode\": \"grouped\",\n            \"layout\": \"vertical\",\n            \"barValues\": true,\n            \"customDimensions\": true,\n            \"legendPosition\": \"Horizontal\",\n            \"innerPadding\": 0.5,\n            \"legendWidth\": 150,\n            \"marginBottom\": 90,\n            \"positionLabel\": \"top\",\n            \"barWidth\": 1,\n            \"ignoreNonDefinedParams\": true,\n            \"hideSelections\": true\n          },\n          \"collapseTimeout\": 0,\n          \"schema\": []\n        }\n      ]\n    },\n    {\n      \"title\": \"Series\",\n      \"reports\": [\n        {\n          \"id\": \"151e531a-ba26-4810-8829-066a8f6f3a7e\",\n          \"title\": \"Data Model\",\n          \"query\": \"Call db.schema.visualization()\\n\\n\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": true,\n          \"width\": 7,\n          \"height\": 2,\n          \"x\": 0,\n          \"y\": 0,\n          \"type\": \"graph\",\n          \"fields\": [\n            [\n              \"_Neodash_Dashboard\",\n              \"name\",\n              \"indexes\",\n              \"constraints\"\n            ],\n            [\n              \"SPEC_200\",\n              \"name\",\n              \"indexes\",\n        \"title\": \"Deficit Guides \",\n          \"query\": \"MATCH (p:SPEC)\u003c-[:ASSOCIATED_SPEC]-(g:GUIDE)-[r:HAVING_SERIES]-\u003e(s:SERIES {Series: $neodash_series_series})\\nWITH g, s, r,\\n     CASE \\n       WHEN r.Quantity \u003e= g.PPR1_Guide_Limit THEN true\\n       ELSE false \\n     END AS DemandStatus\\nWHERE DemandStatus = true\\nRETURN \\n  g.GH_ID AS GUIDES,\\n  s.Series AS SERIES,\\n  round(coalesce(r.Quantity, 0)) AS Present_Demand_Value,\\n  round(coalesce(g.PPR1_Guide_Limit, 0) - coalesce(r.Quantity, 0)) AS Demand_Deficit\\nORDER BY Demand_Deficit ASC\\n\\n\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": false,\n          \"width\": 12,\n          \"height\": 3,\n          \"x\": 0,\n          \"y\": 5,\n          \"type\": \"table\",\n          \"fields\": [\n            \"GUIDES\",\n            \"SERIES\",\n            \"Present_Demand_Value\",\n            \"Demand_Deficit\"\n          ],\n          \"selection\": {},\n          \"settings\": {},\n          \"collapseTimeout\": 0\n        },\n        {\n          \"id\": \"08ef4938-34c0-4d47-be05-fa52ad7a89af\",\n          \"title\": \"Details - Guide Summary for selected Series\",\n          \"query\": \"MATCH (spec:SPEC)\u003c-[:ASSOCIATED_SPEC]-(guide:GUIDE)-[r:HAVING_SERIES]-\u003e(series:SERIES {Series: $neodash_series_series})\\nWITH\\n  guide.GH_ID AS GH_ID,\\n  spec.Spec AS Spec,\\n  series.Series AS SERIES,\\n  guide.PPR1_Guide_Limit AS Guide_Limit,\\n  coalesce(r.Quantity, 0) AS Demand\\nRETURN\\n  Spec,\\n  GH_ID,\\n  SERIES,\\n  round(Demand) AS Present_Demand_Value,\\n  round(Guide_Limit - Demand) AS Unmet_Demand\\nORDER BY Spec\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": false,\n          \"width\": 23,\n          \"height\": 3,\n          \"x\": 0,\n          \"y\": 2,\n          \"type\": \"table\",\n          \"fields\": [\n            \"Spec\",\n            \"GH_ID\",\n            \"SERIES\",\n "x\": 0,\n          \"y\": 0,\n          \"type\": \"select\",\n          \"fields\": [],\n          \"selection\": {},\n          \"settings\": {\n            \"type\": \"Node Property\",\n            \"entityType\": \"SERIES\",\n            \"propertyType\": \"Series\",\n            \"propertyTypeDisplay\": \"Series\",\n            \"parameterName\": \"neodash_series_series\"\n          },\n          \"collapseTimeout\": 0,\n          \"schema\": []\n        },\n        {\n          \"id\": \"757409fd-5def-480d-ad94-7f17779b7c9b\",\n          \"title\": \"Demand for guide\",\n          \"query\": \"MATCH (g:GUIDE)-[r:HAVING_SERIES]-\u003e(series:SERIES {Series: $neodash_series_series})\\nWITH\\n  g.GH_ID AS GH_ID,\\n  series.Series AS SERIES,\\n  g.PPR1_Guide_Limit AS Guide_Limit,\\n  g.Guide_Description as Guide,\\n  r.Quantity AS Demand\\nRETURN\\n  GH_ID,\\n  Guide,\\n  Demand\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": false,\n          \"width\": 19,\n          \"height\": 4,\n          \"x\": 0,\n          \"y\": 5,\n          \"type\": \"table\",\n          \"fields\": [\n            \"GH_ID\",\n            \"Guide\",\n            \"Demand\"\n          ],\n          \"selection\": {},\n          \"settings\": {},\n          \"collapseTimeout\": 0,\n          \"schema\": []\n        },\n        {\n          \"id\": \"730665b0-d266-4322-a747-c8740dcd5773\",\n          \"title\": \"Guide limit\",\n          \"query\": \"\\nMATCH (s:SERIES {Series: $neodash_series_series})\\nMATCH (g:GUIDE)-[:HAVING_SERIES]-\u003e(s)\\nRETURN\\n  g.GH_ID AS id,\\n  g.Guide_Description as Guide,         \\n  g.PPR1_Guide_Limit AS Guide_Limit\\n \\n\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": true,\n          \"width\": 19,\n          \"height\": 3,\n          \"x\": 0,\n          \"y\": 2,\n          \"type\": \"table\",\n          \"fields\": [\n            \"id\",\n            \"Guide\",\n            \"Guide_Limit\"\n          ],\n          \"selection\": {},\n          \"settings\": {},\n          \"collapseTimeout\": 0,\n          \"schema\": []\n        },\n        {\n          \"id\": \"7f104b3b-7e79-4005-8038-842fe87a1223\",\n          \"title\": \"Guide limit vs Demand for guide\",\n          \"query\": \"MATCH (guide:GUIDE)-[r:HAVING_SERIES]-\u003e(series:SERIES {Series: $neodash_series_series})\\nWITH\\n  guide.GH_ID AS GH_ID,\\n  guide.PPR1_Guide_Limit AS Guide_Limit,\\n  coalesce(r.Quantity, 0) AS Demand,\\n  guide.Guide_Description AS Guide_Description\\nWHERE Demand \u003e Guide_Limit   \\nRETURN\\n  GH_ID,\\n  Guide_Description,\\n  Guide_Limit,\\n  Demand,\\n  round(Demand - Guide_Limit) AS Demand_exceeds\\nORDER BY Demand_exceeds DESC\\n\\n\\n\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": false,\n          \"width\": 19,\n          \"height\": 4,\n          \"x\": 0,\n          \"y\": 9,\n          \"type\": \"table\",\n          \"fields\": [\n            \"GH_ID\",\n            \"Guide_Description\",\n            \"Guide_Limit\",\n            \"Demand\",\n            \"Demand_exceeds\"\n          ],\n          \"selection\": {},\n          \"settings\": {},\n          \"collapseTimeout\": 0\n        },\n        {\n          \"id\": \"6b11c578-8073-4406-8172-64a49123f6f4\",\n          \"title\": \"Demand - What if analysis for selected guide (Eg: 10% increase enter 10 or 10% decrease enter -10)\",\n          \"query\": \"RETURN true;\",\n          \"settingsOpen\": false,\n          \"advancedSettingsOpen\": true,\n          \"width\": 19,\n          \"height\": 2,\n          \"x\": 0,\n          \"y\": 16,\n          \"type\": \"select\",\n          \"fields\": [],\n          \"selection\": {},\n          \"settings\": {\n            \"type\": \"Free Text\",\n            \"defaultValue\": \"0\",\n            \"description\": \"Eg: 10% increase enter 10\\n10% decrease enter -10\",\n            \"entityType\": \"Demand perce ) AS Adjusted_Demand,\\n//   round(Adjusted_Demand - Adjusted_Guide_Limit) AS Demand_Exceeds\\n// WHERE Adjusted_Demand \u003e Adjusted_Guide_Limit\\n// RETURN\\n//   GH_ID,\\n//   Guide_Description,\\n//   Original_Guide_Limit,\\n//   Original_Demand,\\n//   Adjusted_Guide_Limit,\\n//   Adjusted_Demand,\\n//   Demand_Exceeds\\n// ORDER BY Demand_Exceeds DESC\\n\\n\\nMATCH (guide:GUIDE {GH_ID: $neodash_guide_gh_id})-[r:HAVING_SERIES]-\u003e(series:SERIES {Series: $neodash_series_series})\\nWITH\\n  guide.GH_ID AS GH_ID,\\n  guide.Guide_Description AS Guide_Description,\\n  guide.PPR1_Guide_Limit AS Original_Guide_Limit,\\n  coalesce(r.Quantity, 0) AS Original_Demand,\\n\\n  CASE WHEN $neodash_guide_limit_percent_change IS NULL OR trim($neodash_guide_limit_percent_change) = \u0027\u0027 THEN 0\\n       ELSE toFloat($neodash_guide_limit_percent_change) END AS Guide_Limit_Percent_Change,\\n\\n  CASE WHEN $neodash_demand_percent_change IS NULL OR trim($neodash_demand_percent_change) = \u0027\u0027 THEN 0\\n       ELSE toFloat($neodash_demand_percent_change) END AS Demand_Percent_Change\\n\\nWITH \\n  GH_ID,\\n  Guide_Description,\\n  Original_Guide_Limit,\\n  Original_Demand,\\n  Guide_Limit_Percent_Change,\\n  Demand_Percent_Change,\\n\\n  Original_Guide_Limit * (Guide_Limit_Percent_Change / 100.0) AS Adjusted_Guide_Limit_Change,\\n  Original_Demand * (Demand_Percent_Change / 100.0) AS Adjusted_Demand_Change\\n\\nWITH \\n  GH_ID,\\n  Guide_Description,\\n  Original_Guide_Limit,\\n  Guide_Limit_Percent_Change,\\n  round(Adjusted_Guide_Limit_Change) AS Adjusted_Guide_Limit_Change,\\n  round(Original_Guide_Limit + Adjusted_Guide_Limit_Change) AS Final_Adjusted_Guide_Limit,\\n\\n  Original_Demand,\\n  Demand_Percent_Change,\\n  round(Adjusted_Demand_Change) AS Adjusted_Demand_Change,\\n  round(Original_Demand + Adjusted_Demand_Change) AS Final_Adjusted_Demand\\n\\nWITH *,\\n  round(Final_Adjusted_Demand - Final_Adjusted_Guide_Limit) AS Demand_Exceeds,\\n  CASE \\n    WHEN
