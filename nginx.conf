# ─────────────────────────────────────────────────────────────────────────────
#  Ascentt Platform — single-port path-based routing
#  ALB terminates HTTPS, forwards to this nginx on port 80
#  Domain: https://graph-mvp.demo.savetime.com
#
#  /            → Landing  (static, /var/www/ascentt/landing)
#  /petrol/     → Petrol IoT frontend (static, CRA homepage=/petrol/)
#    /petrol/api/   → proxy → 127.0.0.1:8001  (strip /petrol prefix)
#  /causal/     → Causal frontend (static, CRA homepage=/causal/)
#    /causal/graph/    → proxy → 127.0.0.1:8002
#    /causal/analyze   → proxy → 127.0.0.1:8002
#    /causal/sim/      → proxy → 127.0.0.1:8002
#  /gains/      → GAINS frontend (static, Vite base=/gains/)
#    /gains/api/    → proxy → 127.0.0.1:3003
#    /gains/auth/   → proxy → 127.0.0.1:3003
#    /gains/llm/    → proxy → 127.0.0.1:3003
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;

    # Allow file uploads (Causal CSV uploads)
    client_max_body_size 50M;

    # ── Petrol IoT ────────────────────────────────────────────────────────────
    location /petrol/api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /petrol/ {
        alias /var/www/ascentt/petrol/;
        try_files $uri $uri/ /petrol/index.html;
    }

    # ── Causal ────────────────────────────────────────────────────────────────
    location /causal/graph/ {
        proxy_pass http://127.0.0.1:8002/graph/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /causal/analyze {
        proxy_pass http://127.0.0.1:8002/analyze;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /causal/sim/ {
        proxy_pass http://127.0.0.1:8002/sim/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /causal/ {
        alias /var/www/ascentt/causal/;
        try_files $uri $uri/ /causal/index.html;
    }

    # ── GAINS ─────────────────────────────────────────────────────────────────
    location /gains/api/ {
        proxy_pass http://127.0.0.1:3003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gains/auth/ {
        proxy_pass http://127.0.0.1:3003/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gains/llm/ {
        proxy_pass http://127.0.0.1:3003/llm/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gains/ {
        alias /var/www/ascentt/gains/;
        try_files $uri $uri/ /gains/index.html;
    }

    # ── Landing (root) ────────────────────────────────────────────────────────
    location / {
        root /var/www/ascentt/landing;
        try_files $uri $uri/ /index.html;
    }
}
