# ── Landing Page (port 80) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /var/www/ascentt/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Petrol IoT Frontend (port 3001) + API proxy ───────────────────────────────
server {
    listen 3001;
    server_name _;
    root /var/www/ascentt/petrol;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

